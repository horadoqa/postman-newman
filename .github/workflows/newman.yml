name: Newman CI Professional

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * *' # 09:00 BRT

env:
  TZ: America/Sao_Paulo

jobs:
  test:
    runs-on: ubuntu-latest
    outputs:
      timestamp: ${{ steps.set-timestamp.outputs.DATE }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Newman
        run: |
          echo '{}' > package.json
          npm install newman@^6 newman-reporter-htmlextra@^1

      - name: Start ServeRest
        run: npx -y serverest@latest &

      - name: Wait for API
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:3000/usuarios >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Generate timestamp
        id: set-timestamp
        run: |
          DATE=$(date +'%Y-%m-%d_%H-%M-%S')
          echo "DATE=$DATE" >> $GITHUB_ENV
          echo "::set-output name=DATE::$DATE"

      - name: Run Newman tests
        run: |
          mkdir -p reports/${{ steps.set-timestamp.outputs.DATE }}
          npx newman run postman/TesteApiServeRest.postman_collection.json \
            -r htmlextra,json \
            --reporter-htmlextra-export reports/${{ steps.set-timestamp.outputs.DATE }}/index.html \
            --reporter-json-export reports/${{ steps.set-timestamp.outputs.DATE }}/report.json \
            --reporter-htmlextra-title "ServeRest - ${{ steps.set-timestamp.outputs.DATE }}" \
            --reporter-htmlextra-darkTheme

      - name: Upload reports artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-test-reports
          path: reports

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: site
        continue-on-error: true

      - name: Download test reports
        uses: actions/download-artifact@v4
        with:
          name: api-test-reports
          path: temp-reports

      - name: Prepare folders
        run: |
          TIMESTAMP=${{ needs.test.outputs.timestamp }}
          mkdir -p site/$TIMESTAMP
          cp -r temp-reports/$TIMESTAMP/* site/$TIMESTAMP/

      - name: Keep last 30 executions
        run: |
          cd site
          ls -d */ 2>/dev/null | sort -r | tail -n +31 | xargs rm -rf || true
          cd ..

      - name: Generate dashboard
        run: |
          rm -f site/index.html

          cat << 'EOF' > site/index.html
          <html>
          <head>
          <title>API Test Dashboard</title>
          <style>
            body{
              font-family:Arial;
              background:#0f172a;
              color:white;
              text-align:center;
              margin:0;
              padding:0
            }
            h1{margin-top:40px}

            .grid{
              display:grid;
              grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
              gap:20px;
              max-width:1000px;
              margin:auto;
              padding:20px
            }

            .card{
              background:#1e293b;
              padding:20px;
              border-radius:10px;
              box-shadow:0 4px 10px rgba(0,0,0,0.4)
            }

            .pass{color:#22c55e;font-weight:bold}
            .fail{color:#ef4444;font-weight:bold}

            a{
              color:#38bdf8;
              text-decoration:none;
              font-weight:bold
            }

            a:hover{color:#0ea5e9}
          </style>
          </head>
          <body>

          <h1>🧪 API Test Dashboard</h1>

          <div class="grid">
          EOF

    # percorre as pastas ordenadas da mais recente para a mais antiga
    for d in $(ls -d site/*/ 2>/dev/null | sort -r); do

      [ -f "$d/report.json" ] || continue

      DATE=$(basename "$d")

      DISPLAY_DATE=$(echo $DATE | cut -d'_' -f1)
      DISPLAY_TIME=$(echo $DATE | cut -d'_' -f2 | tr '-' ':')

      FAIL=$(jq '.run.failures | length' "$d/report.json")
      TOTAL=$(jq '.run.stats.assertions.total' "$d/report.json")

      if [ "$FAIL" -eq "0" ]; then
        STATUS="<span class='pass'>✔ $TOTAL testes</span>"
      else
        STATUS="<span class='fail'>❌ $FAIL falhas / $TOTAL</span>"
      fi

      echo "<div class='card'>" >> site/index.html
      echo "<p>📅 $DISPLAY_DATE</p>" >> site/index.html
      echo "<p>🕒 $DISPLAY_TIME</p>" >> site/index.html
      echo "<p>$STATUS</p>" >> site/index.html
      echo "<a href='$DATE/'>Abrir relatório</a>" >> site/index.html
      echo "</div>" >> site/index.html

    done

    cat << 'EOF' >> site/index.html
    </div>
    </body>
    </html>
    EOF

      - name: Commit reports
        run: |
          cd site
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "update test reports" || echo "nothing to commit"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} gh-pages -f


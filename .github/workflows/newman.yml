name: Newman CI Professional

on:
  push:
    branches: [ main, master ] # dispara em push nas branches principais
  workflow_dispatch: # permite disparo manual
  schedule:
    - cron: '0 12 * * *' # executa todo dia às 12:00 UTC (09:00 BRT)

env:
  TZ: America/Sao_Paulo

jobs:
  newman-ci:
    runs-on: ubuntu-latest

    steps:
      # ---------------------------------------------------------------
      # Passo 1: Pega o código do repositório
      # ---------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------------------------------------------------------------
      # Passo 2: Instala Node.js
      # ---------------------------------------------------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ---------------------------------------------------------------
      # Passo 3: Instala Newman e reporter extra
      # ---------------------------------------------------------------
      - name: Install Newman
        run: |
          echo '{}' > package.json
          npm install newman@^6 newman-reporter-htmlextra@^1

      # ---------------------------------------------------------------
      # Passo 4: Inicia a API ServeRest
      # ---------------------------------------------------------------
      - name: Start ServeRest
        run: npx -y serverest@latest &

      # ---------------------------------------------------------------
      # Passo 5: Espera a API ficar disponível
      # ---------------------------------------------------------------
      - name: Wait for API
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:3000/usuarios >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      # ---------------------------------------------------------------
      # Passo 6: Cria timestamp da execução
      # ---------------------------------------------------------------
      - name: Generate timestamp
        id: set-timestamp
        run: |
          DATE=$(date +'%Y-%m-%d_%H-%M-%S')
          echo "DATE=$DATE" >> $GITHUB_ENV
          echo "::set-output name=DATE::$DATE"

      # ---------------------------------------------------------------
      # Passo 7: Executa os testes Newman
      # ---------------------------------------------------------------
      - name: Run Newman tests
        run: |
          mkdir -p reports/${{ steps.set-timestamp.outputs.DATE }}
          npx newman run postman/TesteApiServeRest.postman_collection.json \
            -r htmlextra,json \
            --reporter-htmlextra-export reports/${{ steps.set-timestamp.outputs.DATE }}/index.html \
            --reporter-json-export reports/${{ steps.set-timestamp.outputs.DATE }}/report.json \
            --reporter-htmlextra-title "ServeRest - ${{ steps.set-timestamp.outputs.DATE }}" \
            --reporter-htmlextra-darkTheme

      # ---------------------------------------------------------------
      # Passo 8: Pega a branch gh-pages para atualizar os relatórios
      # ---------------------------------------------------------------
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: site
        continue-on-error: true

      # ---------------------------------------------------------------
      # Passo 9: Copia os relatórios do Newman para a branch gh-pages
      # ---------------------------------------------------------------
      - name: Copy test reports
        run: |
          TIMESTAMP=${{ steps.set-timestamp.outputs.DATE }}
          mkdir -p site/$TIMESTAMP
          cp -r reports/$TIMESTAMP/* site/$TIMESTAMP/

      # ---------------------------------------------------------------
      # Passo 10: Mantém apenas os últimos 30 relatórios
      # ---------------------------------------------------------------
      - name: Keep last 30 executions
        run: |
          cd site
          ls -d */ 2>/dev/null | sort -r | tail -n +31 | xargs rm -rf || true
          cd ..

      # ---------------------------------------------------------------
      # Passo 11: Gera o dashboard HTML
      # ---------------------------------------------------------------
      - name: Generate dashboard
        run: |
          rm -f site/index.html

          cat << 'EOF' > site/index.html
          <html>
          <head>
          <title>API Test Dashboard</title>
          <style>
            body{font-family:Arial;background:#0f172a;color:white;text-align:center;margin:0;padding:0}
            h1{margin-top:40px}
            .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;max-width:1000px;margin:auto;padding:20px}
            .card{background:#1e293b;padding:20px;border-radius:10px;box-shadow:0 4px 10px rgba(0,0,0,0.4)}
            .pass{color:#22c55e;font-weight:bold}
            .fail{color:#ef4444;font-weight:bold}
            a{color:#38bdf8;text-decoration:none;font-weight:bold}
            a:hover{color:#0ea5e9}
          </style>
          </head>
          <body>
          <h1>🧪 API Test Dashboard</h1>
          <div class="grid">
          EOF

          # Loop pelas pastas de execução ordenadas da mais recente para a mais antiga
          for d in $(ls -d site/*/ 2>/dev/null | sort -r); do
            [ -f "$d/report.json" ] || continue

            DATE=$(basename "$d")
            DISPLAY_DATE=$(echo $DATE | cut -d'_' -f1)
            DISPLAY_TIME=$(echo $DATE | cut -d'_' -f2 | tr '-' ':')

            FAIL=$(jq '.run.failures | length' "$d/report.json")
            TOTAL=$(jq '.run.stats.assertions.total' "$d/report.json")

            if [ "$FAIL" -eq "0" ]; then
              STATUS="<span class='pass'>✔ $TOTAL testes</span>"
            else
              STATUS="<span class='fail'>❌ $FAIL falhas / $TOTAL</span>"
            fi

            echo "<div class='card'>" >> site/index.html
            echo "<p>📅 $DISPLAY_DATE</p>" >> site/index.html
            echo "<p>🕒 $DISPLAY_TIME</p>" >> site/index.html
            echo "<p>$STATUS</p>" >> site/index.html
            echo "<a href='$DATE/'>Abrir relatório</a>" >> site/index.html
            echo "</div>" >> site/index.html
          done

          cat << 'EOF' >> site/index.html
          </div>
          </body>
          </html>
          EOF

      # ---------------------------------------------------------------
      # Passo 12: Comita e envia para gh-pages
      # ---------------------------------------------------------------
      - name: Commit reports
        run: |
          cd site
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "update test reports" || echo "nothing to commit"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} gh-pages -f
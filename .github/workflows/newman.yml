name: Newman CI Professional

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * *' # 09:00 BRT

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    env:
      TZ: America/Sao_Paulo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Newman
        run: |
          echo '{}' > package.json
          npm install newman@^6 newman-reporter-htmlextra@^1

      - name: Start ServeRest
        run: npx -y serverest@latest &

      - name: Wait for API
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:3000/usuarios >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Generate timestamp
        run: |
          DATE=$(date +'%Y-%m-%d_%H-%M-%S')
          echo "DATE=$DATE" >> $GITHUB_ENV

      # ---------------------------
      # Checkout gh-pages branch
      # ---------------------------
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: site
        continue-on-error: true

      - name: Prepare folders
        run: |
          mkdir -p site/$DATE

      # ---------------------------
      # Run Newman tests
      # ---------------------------
      - name: Run tests
        run: |
          npx newman run postman/TesteApiServeRest.postman_collection.json \
            -r htmlextra,json \
            --reporter-htmlextra-export site/$DATE/index.html \
            --reporter-json-export site/$DATE/report.json \
            --reporter-htmlextra-title "ServeRest - $DATE" \
            --reporter-htmlextra-darkTheme

      # ---------------------------
      # Keep only last 30 reports
      # ---------------------------
      - name: Keep last 30 executions
        run: |
          cd site
          ls -d */ 2>/dev/null | sort -r | tail -n +31 | xargs rm -rf || true
          cd ..

      # ---------------------------
      # Generate dashboard
      # ---------------------------
      - name: Generate dashboard
        run: |
          cat << 'EOF' > site/index.html
          <html>
          <head>
          <title>API Test Dashboard</title>
          <style>
            body{font-family:Arial;background:#0f172a;color:white;text-align:center;margin:0;padding:0}
            h1{margin-top:40px}
            .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px;max-width:1000px;margin:auto;padding:20px}
            .card{background:#1e293b;padding:20px;border-radius:10px}
            .pass{color:#22c55e}
            .fail{color:#ef4444}
            a{color:#38bdf8;text-decoration:none;font-weight:bold}
          </style>
          </head>
          <body>
          <h1>🧪 API Test Dashboard</h1>
          <div class="grid">
          EOF

          for d in site/*/; do
            [ -f "$d/report.json" ] || continue
            DATE=$(basename $d)
            DISPLAY_DATE=$(echo $DATE | cut -d'_' -f1)
            DISPLAY_TIME=$(echo $DATE | cut -d'_' -f2-)

            FAIL=$(jq '.run.failures | length' $d/report.json)
            TOTAL=$(jq '.run.stats.assertions.total' $d/report.json)

            if [ "$FAIL" -eq "0" ]; then
              STATUS="<span class='pass'>✔ $TOTAL testes</span>"
            else
              STATUS="<span class='fail'>❌ $FAIL falhas / $TOTAL</span>"
            fi

            echo "<div class='card'>" >> site/index.html
            echo "<p>📅 $DISPLAY_DATE</p>" >> site/index.html
            echo "<p>🕒 $DISPLAY_TIME</p>" >> site/index.html
            echo "<p>$STATUS</p>" >> site/index.html
            echo "<a href='$DATE/'>Abrir relatório</a>" >> site/index.html
            echo "</div>" >> site/index.html
          done

          cat << 'EOF' >> site/index.html
          </div>
          </body>
          </html>
          EOF

      # ---------------------------
      # Commit and push to gh-pages
      # ---------------------------
      - name: Commit reports
        run: |
          cd site
          git init
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "update test reports" || echo "nothing to commit"
          git branch -M gh-pages
          git remote add origin https://github.com/${{ github.repository }}
          git push -f origin gh-pages
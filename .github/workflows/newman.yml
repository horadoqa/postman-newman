name: Newman CI Professional

on:
  push:
    branches: [ main, master ] 
  workflow_dispatch: 
  schedule:
    - cron: '0 12 * * *' 

env:
  TZ: America/Sao_Paulo

jobs:
  newman-ci:
    runs-on: ubuntu-latest

    steps:
      # ---------------------------------------------------------------
      # 1️⃣ Checkout do repositório principal
      # ---------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------------------------------------------------------------
      # 2️⃣ Configura Node.js
      # ---------------------------------------------------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ---------------------------------------------------------------
      # 3️⃣ Instala Newman e reporter extra
      # ---------------------------------------------------------------
      - name: Install Newman
        run: |
          echo '{}' > package.json
          npm install newman@^6 newman-reporter-htmlextra@^1

      # ---------------------------------------------------------------
      # 4️⃣ Inicia API ServeRest
      # ---------------------------------------------------------------
      - name: Start ServeRest
        run: npx -y serverest@latest &

      # ---------------------------------------------------------------
      # 5️⃣ Espera a API ficar disponível
      # ---------------------------------------------------------------
      - name: Wait for API
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:3000/usuarios >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      # ---------------------------------------------------------------
      # 6️⃣ Cria timestamp da execução
      # ---------------------------------------------------------------
      - name: Generate timestamp
        id: set-timestamp
        run: |
          DATE=$(date '+%Y-%m-%d_%H-%M-%S')
          echo "DATE=$DATE" >> $GITHUB_OUTPUT

      # ---------------------------------------------------------------
      # 7️⃣ Executa testes Newman e salva relatórios
      # ---------------------------------------------------------------
      - name: Run Newman tests
        run: |
          mkdir -p reports/${{ steps.set-timestamp.outputs.DATE }}
          npx newman run postman/TesteApiServeRest.postman_collection.json \
            -r htmlextra,json \
            --reporter-htmlextra-export reports/${{ steps.set-timestamp.outputs.DATE }}/index.html \
            --reporter-json-export reports/${{ steps.set-timestamp.outputs.DATE }}/report.json \
            --reporter-htmlextra-title "ServeRest - ${{ steps.set-timestamp.outputs.DATE }}" \
            --reporter-htmlextra-darkTheme

      # ---------------------------------------------------------------
      # 8️⃣ Checkout da branch gh-pages
      # ---------------------------------------------------------------
      - name: Checkout gh-pages branch
        run: |
          git fetch origin gh-pages || true
          if git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
          fi
          git reset --hard origin/gh-pages || true

      # ---------------------------------------------------------------
      # 9️⃣ Copia os relatórios recentes para a raiz da branch gh-pages
      # ---------------------------------------------------------------
      - name: Copy test reports
        run: |
          TIMESTAMP=${{ steps.set-timestamp.outputs.DATE }}
          mkdir -p $TIMESTAMP
          cp -r $GITHUB_WORKSPACE/reports/$TIMESTAMP/* $TIMESTAMP/

      # ---------------------------------------------------------------
      # 🔟 Mantém apenas os últimos 30 relatórios
      # ---------------------------------------------------------------
      - name: Keep last 30 executions
        run: |
          REPORTS=(*/)
          NUM_REPORTS=${#REPORTS[@]}
          if [ $NUM_REPORTS -gt 30 ]; then
            REMOVE=${REPORTS[@]:30}
            echo "${REMOVE[@]}" | xargs rm -rf
          fi

      # ---------------------------------------------------------------
      # 1️⃣1️⃣ Gera o dashboard HTML
      # ---------------------------------------------------------------
      - name: Generate dashboard
        run: |
          rm -f index.html

          cat << 'EOF' > index.html
          <html>
          <head>
          <title>API Test Dashboard</title>
          <style>
            body{font-family:Arial;background:#0f172a;color:white;text-align:center;margin:0;padding:0}
            h1{margin-top:40px}
            .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;max-width:1000px;margin:auto;padding:20px}
            .card{background:#1e293b;padding:20px;border-radius:10px;box-shadow:0 4px 10px rgba(0,0,0,0.4)}
            .pass{color:#22c55e;font-weight:bold}
            .fail{color:#ef4444;font-weight:bold}
            a{color:#38bdf8;text-decoration:none;font-weight:bold}
            a:hover{color:#0ea5e9}
          </style>
          </head>
          <body>
          <h1>🧪 API Test Dashboard</h1>
          <div class="grid">
          EOF

          for d in */; do
            DIR="${d%/}"
            [ -f "$DIR/report.json" ] || continue

            DATE="$DIR"
            DISPLAY_DATE=$(echo $DATE | cut -d'_' -f1)
            DISPLAY_TIME=$(echo $DATE | cut -d'_' -f2 | tr '-' ':')

            FAIL=$(jq '.run.failures | length' "$DIR/report.json")
            TOTAL=$(jq '.run.stats.assertions.total' "$DIR/report.json")

            if [ "$FAIL" -eq "0" ]; then
              STATUS="<span class='pass'>✔ $TOTAL testes</span>"
            else
              STATUS="<span class='fail'>❌ $FAIL falhas / $TOTAL</span>"
            fi

            echo "<div class='card'>" >> index.html
            echo "<p>📅 $DISPLAY_DATE</p>" >> index.html
            echo "<p>🕒 $DISPLAY_TIME</p>" >> index.html
            echo "<p>$STATUS</p>" >> index.html
            echo "<a href='$DATE/'>Abrir relatório</a>" >> index.html
            echo "</div>" >> index.html
          done

          cat << 'EOF' >> index.html
          </div>
          </body>
          </html>
          EOF

      # ---------------------------------------------------------------
      # 1️⃣2️⃣ Comita e envia os relatórios e dashboard para gh-pages
      # ---------------------------------------------------------------
      - name: Commit reports
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "update test reports" || echo "nothing to commit"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} gh-pages
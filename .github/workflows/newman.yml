name: API Test Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * *'

env:
  TZ: America/Sao_Paulo

jobs:

  test:

    runs-on: ubuntu-latest

    outputs:
      timestamp: ${{ steps.timestamp.outputs.date }}

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Newman
        run: |
          echo '{}' > package.json
          npm install newman newman-reporter-htmlextra

      - name: Start ServeRest API
        run: npx -y serverest@latest &

      - name: Wait for API
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:3000/usuarios > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Generate timestamp
        id: timestamp
        run: |
          DATE=$(date +'%Y-%m-%d_%H-%M-%S')
          echo "date=$DATE" >> $GITHUB_OUTPUT

      - name: Run API tests
        run: |

          mkdir -p reports/${{ steps.timestamp.outputs.date }}

          npx newman run postman/TesteApiServeRest.postman_collection.json \
            -r htmlextra,json \
            --reporter-htmlextra-export reports/${{ steps.timestamp.outputs.date }}/index.html \
            --reporter-json-export reports/${{ steps.timestamp.outputs.date }}/report.json \
            --reporter-htmlextra-title "ServeRest - ${{ steps.timestamp.outputs.date }}" \
            --reporter-htmlextra-darkTheme

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: reports

  deploy:

    needs: test
    runs-on: ubuntu-latest

    steps:

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: site
        continue-on-error: true

      - name: Download reports
        uses: actions/download-artifact@v4
        with:
          name: api-test-reports
          path: artifacts

      - name: Prepare folders
        run: |
          TIMESTAMP=${{ needs.test.outputs.timestamp }}
          mkdir -p site/$TIMESTAMP
          echo "Searching for report folder..."
          SOURCE=$(find . -type d -name "$TIMESTAMP" | head -n 1)
          echo "Found source: $SOURCE"
          cp -r $SOURCE/* site/$TIMESTAMP/

      - name: Keep last 30 executions
        run: |
          cd site
          ls -d */ 2>/dev/null | sort -r | tail -n +31 | xargs rm -rf || true
          cd ..

      - name: Generate dashboard
        run: |

          rm -f site/index.html

          TOTAL_RUNS=0
          TOTAL_FAILS=0

          cat << 'EOF' > site/index.html
          <html>
          <head>

          <title>API Test Dashboard</title>

          <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

          <style>

          body{
          font-family:Arial;
          background:#0f172a;
          color:white;
          text-align:center
          }

          .grid{
          display:grid;
          grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
          gap:20px;
          max-width:1000px;
          margin:auto
          }

          .card{
          background:#1e293b;
          padding:20px;
          border-radius:10px
          }

          .pass{color:#22c55e}
          .fail{color:#ef4444}

          a{color:#38bdf8;text-decoration:none}

          canvas{
          max-width:800px;
          margin:auto
          }

          </style>

          </head>

          <body>

          <h1>🧪 API Test Dashboard</h1>

          <canvas id="chart"></canvas>

          <h2>Test Executions</h2>

          <div class="grid">
          EOF

          LABELS=""
          DATA=""

          find site -mindepth 1 -maxdepth 1 -type d | sort -r | while read d; do

            [ -f "$d/report.json" ] || continue

            DATE=$(basename "$d")

            DISPLAY_DATE=$(echo $DATE | cut -d'_' -f1)
            DISPLAY_TIME=$(echo $DATE | cut -d'_' -f2 | tr '-' ':')

            FAIL=$(jq '.run.failures | length' "$d/report.json")
            TOTAL=$(jq '.run.stats.assertions.total' "$d/report.json")

            TOTAL_RUNS=$((TOTAL_RUNS+1))
            TOTAL_FAILS=$((TOTAL_FAILS+FAIL))

            if [ "$FAIL" -eq "0" ]; then
              STATUS="<span class='pass'>✔ $TOTAL testes</span>"
              RESULT=1
            else
              STATUS="<span class='fail'>❌ $FAIL falhas</span>"
              RESULT=0
            fi

            LABELS="$LABELS '$DISPLAY_TIME',"
            DATA="$DATA $RESULT,"

            echo "<div class='card'>" >> site/index.html
            echo "<p>$DISPLAY_DATE</p>" >> site/index.html
            echo "<p>$DISPLAY_TIME</p>" >> site/index.html
            echo "<p>$STATUS</p>" >> site/index.html
            echo "<a href='$DATE/'>Abrir relatório</a>" >> site/index.html
            echo "</div>" >> site/index.html

          done

          cat << EOF >> site/index.html
          </div>

          <script>

          const ctx = document.getElementById('chart');

          new Chart(ctx, {
          type: 'line',
          data: {
          labels: [$LABELS],
          datasets: [{
          label: 'Test Success',
          data: [$DATA],
          borderColor: '#22c55e',
          tension:0.3
          }]
          }
          });

          </script>

          </body>
          </html>
          EOF

      - name: Commit reports
        run: |
          cd site
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "update test reports" || echo "nothing to commit"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} gh-pages -f